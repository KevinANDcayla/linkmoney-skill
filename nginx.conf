# LinkMoney 生产环境 nginx 配置（v3.0 + Cloudflare 代理）
# 域名：linkmoney.online（含 www.linkmoney.online，301 跳主域）
# 前端：Cloudflare（Free）→ 关闭备案 + 边缘加速
# 证书：DigiCert 测试版（2026-06-12 → 2026-12-28，199 天）
# 证书路径：./certs/fullchain.pem + ./certs/privkey.pem

# ===== Cloudflare 官方 IP 段（2024-06 官方公布） =====
# 完整列表：https://www.cloudflare.com/ips/
# 任何想直接访问你 ECS 的请求，只放行 Cloudflare IP 段，其他全 403

# ===== http 80：全部 301 跳 https（仅放行 Cloudflare 边缘） =====
server {
    listen 80;
    listen [::]:80;
    server_name linkmoney.online www.linkmoney.online;

    # 只放行 Cloudflare IP 段
    include /etc/nginx/cloudflare-ips.conf;

    # 强制 HTTPS
    return 301 https://linkmoney.online$request_uri;
}

# ===== https 443：主域 linkmoney.online =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name linkmoney.online;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ===== 关键：让 nginx 识别真实客户端 IP =====
    # Cloudflare 边缘节点都在这里，全部允许
    include /etc/nginx/cloudflare-ips.conf;
    # 真实 IP 来自 CF 透传的 X-Forwarded-For
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # 安全头（Cloudflare 已经会加一层，再加一次更稳）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 标识本站点（运维调试）
    add_header X-LinkMoney "v3.0" always;

    # 日志（包含真实 IP，因为已经 set_real_ip_from）
    access_log /var/log/nginx/linkmoney-access.log;
    error_log  /var/log/nginx/linkmoney-error.log;

    # 公开端点：新手引导页 + 健康检查 + MCP manifest + 根信息（不限速）
    location ~ ^/(onboard-supplier|onboard-buyer|health|mcp/manifest\.json|/?$) {
        proxy_pass http://linkmoney:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # Cloudflare 边缘已经 TLS 终结
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # v3.0 中间 Agent 维护层（建议在 Cloudflare 加 WAF 规则保护）
    location ~ ^/agent/ {
        proxy_pass http://linkmoney:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        # 健康检查批量访问可能较慢
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 业务 API 端点
    location / {
        proxy_pass http://linkmoney:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        # 限流（依赖真实 IP，Cloudflare 模式下会更准）
        # rate limit 已由 Cloudflare 边缘代理承担，nginx 此层不重复
        limit_req_status 429;

        # 超时
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    client_max_body_size 10M;

    # 拒绝非 Cloudflare 的直接访问（直连 443 全部 403）
    if ($realip_remote_addr = "") {
        return 403;
    }
}

# ===== https 443：www → 301 跳主域 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.linkmoney.online;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    include /etc/nginx/cloudflare-ips.conf;

    return 301 https://linkmoney.online$request_uri;
}

# 限流区域定义（需在主 nginx.conf 的 http 块里）
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
