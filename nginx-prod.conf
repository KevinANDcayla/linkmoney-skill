# LinkMoney 生产环境 nginx 配置（v3.0）
# 域名：linkmoney.online + www（301 跳主域）
# 前端：火山 DCDN（海外 Scope=overseas，回源 HTTPS 443）
# 证书：DigiCert DV TLS（2026-06-12 → 2026-12-27，199 天）

# ===== http 80：全部 301 跳 https =====
server {
    listen 80;
    listen [::]:80;
    server_name linkmoney.online www.linkmoney.online;

    return 301 https://linkmoney.online$request_uri;
}

# ===== https 443：主域 linkmoney.online =====
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name linkmoney.online;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from  0.0.0.0/0;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-LinkMoney "v3.0" always;

    access_log /var/log/nginx/linkmoney-access.log;
    error_log  /var/log/nginx/linkmoney-error.log;

    # 公开端点
    location ~ ^/(onboard-supplier|onboard-buyer|health|mcp/manifest\.json|/?$) {
        proxy_pass http://linkmoney:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 中间 Agent 维护层
    location ~ ^/agent/ {
        proxy_pass http://linkmoney:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 业务 API
    location / {
        proxy_pass http://linkmoney:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    client_max_body_size 10M;
}

# ===== https 443：www → 301 跳主域 =====
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.linkmoney.online;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://linkmoney.online$request_uri;
}
